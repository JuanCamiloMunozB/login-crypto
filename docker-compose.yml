services:
  db:
    image: postgres:16-alpine
    container_name: login-db
    environment:
      POSTGRES_DB: logindb
      POSTGRES_USER: loginuser
      POSTGRES_PASSWORD: loginpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loginuser -d logindb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: login-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/logindb
      SPRING_DATASOURCE_USERNAME: loginuser
      SPRING_DATASOURCE_PASSWORD: loginpass
      APP_JWT_SECRET: change-this-secret-to-a-secure-random-32-byte-value
      APP_ADMIN_USERNAME: admin
      APP_ADMIN_PASSWORD: Admin12345
    ports:
      - "8081:8080"

  frontend:
    build: ./frontend
    container_name: login-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  pgdata:
