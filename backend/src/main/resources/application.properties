spring.application.name=login-crypto-backend

# PostgreSQL (values overridden by Docker Compose in production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logindb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:loginuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:loginpass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${APP_JWT_SECRET:dev-secret-key-change-in-production-min-32-bytes}
app.jwt.expiration=3600000

# Initial admin account (change after first login)
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:Admin12345}
